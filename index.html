<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fafaf7" />
    <title>Daily Routine OS — Build the day, every day</title>
    <meta name="description" content="A minimal, Notion-inspired daily routine tracker. Tasks reset every midnight. Build streaks, stay focused." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      // Pre-hydration theme application — prevents light/dark flash on first paint.
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved ? saved === "dark" : prefers;
          if (dark) document.documentElement.classList.add("dark");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#171513" : "#fafaf7");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
